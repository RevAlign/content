<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1456, height=600">
    <title>Why Your HubSpot is Broken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* RevAlign Brand Colors */
        :root {
            --ra-navy: #0A2342;
            --ra-mid-blue: #1A3A5C;
            --ra-teal: #2CA58D;
            --ra-dark-teal: #238A73;
            --ra-white: #FFFFFF;
            --ra-text-secondary: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 1456px;
            height: 600px;
            overflow: hidden;
        }

        .container {
            width: 1456px;
            height: 600px;
            background: linear-gradient(135deg, var(--ra-navy) 0%, var(--ra-mid-blue) 50%, #1E4A6F 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 80px;
            position: relative;
        }

        /* Decorative gradient accent */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--ra-teal) 0%, var(--ra-dark-teal) 50%, var(--ra-teal) 100%);
        }

        /* Subtle grid pattern overlay */
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
        }

        /* Category pill */
        .category {
            display: inline-block;
            background: rgba(44, 165, 141, 0.2);
            border: 1px solid var(--ra-teal);
            color: var(--ra-teal);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 28px;
        }

        .title {
            font-size: 56px;
            font-weight: 800;
            color: var(--ra-white);
            line-height: 1.15;
            margin-bottom: 24px;
            letter-spacing: -1px;
            max-width: 900px;
        }

        .subtitle {
            font-size: 24px;
            font-weight: 500;
            color: var(--ra-teal);
            line-height: 1.4;
            max-width: 700px;
        }

        /* Branding */
        .branding {
            position: absolute;
            bottom: 50px;
            right: 80px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--ra-white);
            letter-spacing: -0.5px;
        }

        .brand-name span {
            color: var(--ra-teal);
        }

        .brand-divider {
            width: 2px;
            height: 24px;
            background: rgba(255,255,255,0.3);
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--ra-text-secondary);
            font-weight: 500;
        }

        /* Decorative accent shapes */
        .accent-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(44, 165, 141, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .accent-1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: 100px;
        }

        .accent-2 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Decorative accents -->
        <div class="accent-circle accent-1"></div>
        <div class="accent-circle accent-2"></div>

        <div class="content">
            
            <div class="category">HUBSPOT</div>
            
            <h1 class="title">Why Your HubSpot is Broken</h1>
            
            <p class="subtitle">And the 3 fixes that actually work</p>
            
        </div>

        <div class="branding">
            <div class="brand-name">Rev<span>Align</span>.io</div>
            <div class="brand-divider"></div>
            <div class="brand-tagline">RevOps for B2B Startups</div>
        </div>
    </div>
</body>
</html>
